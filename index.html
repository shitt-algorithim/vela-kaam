<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle For You</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#ffe6f2;
padding:20px;
}

h1{
color:#ff4d88;
}

#puzzle{
display:grid;
grid-template-columns:repeat(3,100px);
gap:4px;
justify-content:center;
margin-top:20px;
}

.tile{
width:100px;
height:100px;
background-image:url("photo.jpg");
background-size:300px 300px;
border-radius:8px;
cursor:pointer;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#ff4d88;
color:white;
font-size:16px;
margin-top:15px;
}

input{
padding:10px;
width:80%;
max-width:300px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<h1>🧩 Solve This Puzzle</h1>

<div id="puzzle"></div>


<div id="photoPage" style="display:none">

<h2>You solved it 🎉</h2>

<img src="photo.jpg" width="280">

<p>
I don't know if you'll like this or find it weird.  
Just something small I thought of doing.  
Hope you like it 😊
</p>

<button onclick="startQuestions()">Continue</button>

</div>


<div id="questionsPage" style="display:none"></div>


<script>

/* IMAGE PUZZLE */

let order=[0,1,2,3,4,5,6,7,8]

order.sort(()=>Math.random()-0.5)

let puzzle=document.getElementById("puzzle")

let selected=null

order.forEach(i=>{

let tile=document.createElement("div")

tile.className="tile"

let x=(i%3)*-100
let y=Math.floor(i/3)*-100

tile.style.backgroundPosition=x+"px "+y+"px"

tile.onclick=function(){

if(selected==null){

selected=this
this.style.outline="3px solid red"

}else{

let temp=this.style.backgroundPosition
this.style.backgroundPosition=selected.style.backgroundPosition
selected.style.backgroundPosition=temp

selected.style.outline="none"
selected=null

checkWin()

}

}

puzzle.appendChild(tile)

})


function checkWin(){

let tiles=document.querySelectorAll(".tile")

let correct=true

tiles.forEach((t,i)=>{

let x=(i%3)*-100
let y=Math.floor(i/3)*-100

if(t.style.backgroundPosition!=x+"px "+y+"px"){

correct=false

}

})

if(correct){

puzzle.style.display="none"
document.getElementById("photoPage").style.display="block"

}

}


/* QUESTIONS */

const questions=[

"Do I have the right to know what you like? If yes, then let me know by typing your favourite things below like color, place, etc? 😊",

"What is your favourite memory with me? 💭",

"Do you like me? If yes, Would you like to go out for a date with me? ❤️",

"Agar tune yes kia hai pichla by any chance so please enter the date or a month you would like to go on 😄",

"Anything else I should keep in my mind? 😄",

"What do you think about this puzzle? 😊"

]

let current=0
let answers=[]

function startQuestions(){

document.getElementById("photoPage").style.display="none"
document.getElementById("questionsPage").style.display="block"

showQuestion()

}

function showQuestion(){

let q=questions[current]

document.getElementById("questionsPage").innerHTML=`

<h2>${q}</h2>

<input id="ans">

<br>

<button onclick="next()">Next</button>

`

}

function next(){

let val=document.getElementById("ans").value

answers.push(val)

current++

if(current<questions.length){

showQuestion()

}else{

showAnswers()

}

}

function showAnswers(){

let text=""

answers.forEach((a,i)=>{

text+=`<p><b>Answer ${i+1}:</b> ${a}</p>`

})

document.getElementById("questionsPage").innerHTML=`

<h2>Thank you for answering ❤️</h2>

${text}

<p style="color:#ff4d88;font-weight:bold">
Take a screenshot and send it to me 📸😄
</p>

<button onclick="showSecret()">Open Secret Message 💌</button>

`

}


/* SECRET MESSAGE */

function showSecret(){

document.body.innerHTML=`

<h1 style="color:#ff4d88">❤️ A Message For You ❤️</h1>

<p style="max-width:600px;margin:auto;font-size:20px">

From the moment you started this puzzle  
I hoped you would reach this message.  

You are really special to me  
and I enjoy talking to you.  

Maybe this is the start of something beautiful ✨  

Dekho yeah jo phle tumne pda kuch gpt ne likha hai mene nhi likha bdia lga toh chod dia esa hi bki tum 110 km/p+ ki speed se gu khalo photo nhi bhejti ho agr bhejogi toh view once mein esa thodi hota hai bhut dikkt hoti hai bki ab mera dimaag nhi chl ra ky likhna hai . 😴❤️

</p>

`

heartRain()

}


/* HEART RAIN */

function heartRain(){

setInterval(()=>{

let h=document.createElement("div")

h.innerHTML="❤️"

h.style.position="fixed"
h.style.left=Math.random()*100+"%"
h.style.top="-20px"
h.style.fontSize="24px"
h.style.transition="top 3s linear"

document.body.appendChild(h)

setTimeout(()=>{h.style.top="100vh"},50)

setTimeout(()=>{h.remove()},3000)

},200)

}

</script>

</body>
</html>
